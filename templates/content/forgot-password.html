<div class="narrow-container">
  <h1>Forgot Password</h1>

  <p>Enter your email address below and a one-time use passcode will be sent
    to you.</p>

  {% include "layouts/common/error-message.html" %}

  <form action="/forgot-password" method="post">
    <div class="field">
      <label class="label">Email</label>
      <div class="control">
        <input class="input{% if errors.email %} is-danger{% endif %}"
          type="email" name="email" value="{{email}}">
        {% if errors.email %}
        <p class="help is-danger">{{ errors.email }}</p>
        {% endif %}
      </div>
    </div>
    <div class="field">
      <div class="control">
        <button class="button is-link is-fullwidth" type="submit">
          Submit
        </button>
      </div>
    </div>
  </form>
</div>
