<h1>Organizanta profilo</h1>
<form action="/konto/organizanto" method="post">
  <div class="field">
    <label class="label">Nomo</label>
    <div class="control">
      <input class="input{% if errors.name %} is-danger{% endif %}" type="text" name="name"
        value="{{ organizer.name }}" placeholder="Organizanto">
      {% if errors.name %}
      <p class="help is-danger">{{ errors.name }}</p>
      {% endif %}
    </div>
  </div>
  <div class="field">
    <label class="label">Retpoŝtadreso</label>
    <div class="control">
      <input class="input{% if errors.email %} is-danger{% endif %}" type="email" name="email"
        value="{{ organizer.email }}" placeholder="organizanto@ekzemplo.com">
      {% if errors.email %}
      <p class="help is-danger">{{ errors.email }}</p>
      {% endif %}
    </div>
  </div>
  <div class="field">
    <label class="label">Priskribo</label>
    <div class="control">
      <textarea class="input textarea{% if errors.description %} is-danger{% endif %}" rows="8"
        name="description">{{ organizer.description }}</textarea>
      {% if errors.description %}
      <p class="help is-danger">{{ errors.description }}</p>
      {% endif %}
    </div>
  </div>
  <div class="field">
    <div class="control">
      <button class="button is-primary" type="submit">
        Sendi
      </button>
    </div>
  </div>
</form>
