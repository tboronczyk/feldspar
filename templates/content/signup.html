<div class="narrow-centered">
  <h1>Signup</h1>

  {% if error %}
  <div class="message is-danger">
    <div class="message-body">
      <div>{{error}}</div>
    </div>
  </div>
  {%endif%}

  <form action="/signup" method="POST">
    <div class="field">
      <label class="label">Name</label>
      <div class="control">
        <input class="input{% if errors %} is-danger{% endif %}" type="name" name="name" value="{{name}}">
      </div>
    </div>
    <div class="field">
      <label class="label">Email</label>
      <div class="control">
        <input class="input{% if errors %} is-danger{% endif %}" type="email" name="email" value="{{email}}">
      </div>
    </div>
    <div class="field">
      <label class="label">Password</label>
      <div class="control">
        <input class="input{% if errors %} is-danger{% endif %}" type="password" name="password" value="{{password}}">
      </div>
    </div>
    <div class="field">
      <div class="control">
        <button class="button is-link">Submit</button>
      </div>
    </div>
  </form>
</div>
