<h1>Volontula profilo</h1>
<form action="/konto/volontulo" method="post">
  <div class="field">
    <label class="label">Nomo</label>
    <div class="control">
      <input class="input" type="text" name="name" value="{{ volunteer.name }}" placeholder="Nomo">
    </div>
  </div>
  <div class="field">
    <label class="label">Retpoŝtadreso</label>
    <div class="control">
      <input class="input" type="email" readonly disabled value="{{ account.email }}">
    </div>
  </div>
  <div class="field">
    <label class="label">Retejo</label>
    <div class="control">
      <input class="input{% if errors.website %} is-danger{% endif %}" type="text" name="website"
        value="{{ volunteer.website }}" placeholder="https://ekzemplo.com">
      {% if errors.website %}
      <p class="help is-danger">{{ errors.website }}</p>
      {% endif %}
    </div>
  </div>
  <div class="field">
    <label class="label">Priskribo</label>
    <div class="control">
      <textarea class="input textarea{% if errors.description %} is-danger{% endif %}" rows="8"
        name="description">{{ volunteer.description }}</textarea>
      {% if errors.description %}
      <p class="help is-danger">{{ errors.description }}</p>
      {% endif %}
    </div>
  </div>
  <div class="field">
    <div class="control">
      <button class="button is-primary" type="submit">
        Sendi
      </button>
    </div>
  </div>
</form>
