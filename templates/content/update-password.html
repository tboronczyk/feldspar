<div class="narrow-centered">
  <h1>Change Password</h1>

  {% if error %}
  <div class="message is-danger">
    <div class="message-body">
      <div>{{error}}</div>
    </div>
  </div>
  {%endif%}

  <form action="/update-password" method="POST">
    <div class="field">
      <label class="label">Current Password</label>
      <div class="control">
        <input class="input{% if errors %} is-danger{% endif %}" type="password" name="password" value="{{password}}">
      </div>
    </div>
    <div class="field">
      <label class="label">New Password</label>
      <div class="control">
        <input class="input{% if errors %} is-danger{% endif %}" type="password" name="newPassword"
          value="{{newPassword}}">
      </div>
    </div>
    <div class="field">
      <label class="label">Confirm New Password</label>
      <div class="control">
        <input class="input{% if errors %} is-danger{% endif %}" type="password" name="confirmPassword"
          value="{{confirmPassword}}">
      </div>
    </div>
    <div class="field">
      <div class="control">
        <button class="button is-link">Submit</button>
      </div>
    </div>
  </form>
</div>
