<div class="narrow-container">
  <h1>Change Password</h1>

  {% include "layouts/common/error-message.html" %}

  <form action="/update-password" method="post">
    <div class="field">
      <label class="label">Current Password</label>
      <div class="control">
        <input class="input{% if errors.password %} is-danger{% endif %}"
          type="password" name="password" value="{{password}}">
        {% if errors.password %}
        <p class="help is-danger">{{ errors.password }}</p>
        {% endif %}
      </div>
    </div>
    <div class="field">
      <label class="label">New Password</label>
      <div class="control">
        <input class="input{% if errors.newPassword %} is-danger{% endif %}"
          type="password" name="newPassword" value="{{newPassword}}">
        {% if errors.newPassword %}
        <p class="help is-danger">{{ errors.newPassword }}</p>
        {% endif %}
      </div>
    </div>
    <div class="field">
      <label class="label">Confirm New Password</label>
      <div class="control">
        <input class="input{% if errors.confirmPassword %} is-danger{% endif %}"
          type="password" name="confirmPassword" value="{{confirmPassword}}">
        {% if errors.confirmPassword %}
        <p class="help is-danger">{{ errors.confirmPassword }}</p>
        {% endif %}
      </div>
    </div>
    <div class="field">
      <div class="control">
        <button class="button is-link is-fullwidth" type="submit">
          Submit
        </button>
      </div>
    </div>
  </form>
</div>
