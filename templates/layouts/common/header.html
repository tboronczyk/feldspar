<header>
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">
        <a href="/"><img src="/img/logo.png" alt="volontulo" width="135" class="logo"></a>
        <span class="navbar-burger burger">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </div>
      <div class="navbar-menu navbar-main-menu">
        <div class="navbar-end">
          {% if session.get('isAuthenticated') %}
          <a href="/update-account" class="navbar-item is-uppercase"
            title="Update Account">Update Account</a>
          <a href="/update-password" class="navbar-item is-uppercase"
            title="Update Password">Update Password</a>
          <a href="/logout" class="navbar-item is-uppercase"
            title="Logout">Logout</a>
          {% else %}
          <a href="/signup" class="navbar-item is-uppercase"
            title="Sign up">Sign up</a>
          <a href="/login" class="navbar-item is-uppercase"
            title="Log in">Log in</a>
          {% endif %}          
        </div>
      </div>
    </div>
  </nav>

  <script>
  document.querySelector(".navbar-burger").addEventListener("click", (e) => {
      e.preventDefault();
      document.querySelector(".navbar-main-menu").classList.toggle("is-active");
  });
  
  window.addEventListener("resize", (e) => {
      document.querySelector(".navbar-main-menu.is-active").classList.remove("is-active");
  });
    </script>
</header>
